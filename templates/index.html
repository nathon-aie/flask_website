<!DOCTYPE html>
<html lang="en">

<head>
    <title>FGO Servants</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <h1 class="title">FGO Servants</h1>
    <div class="class_category">
        <a href="/class/all" class="button"><b>All Servants</b></a>
        <a href="/class/saber" class="button"><b>Saber</b></a>
        <a href="/class/archer" class="button"><b>Archer</b></a>
        <a href="/class/lancer" class="button"><b>Lancer</b></a>
        <a href="/class/rider" class="button"><b>Rider</b></a>
        <a href="/class/caster" class="button"><b>Caster</b></a>
        <a href="/class/assassin" class="button"><b>Assassin</b></a>
        <a href="/class/berserker" class="button"><b>Berserker</b></a>
    </div>

    <div class="class_category">
        <a href="/class/ruler" class="button"><b>Ruler</b></a>
        <a href="/class/avenger" class="button"><b>Avenger</b></a>
        <a href="/class/moonCancer" class="button"><b>Mooncancer</b></a>
        <a href="/class/alterEgo" class="button"><b>Alter Ego</b></a>
        <a href="/class/foreigner" class="button"><b>Foreigner</b></a>
        <a href="/class/pretender" class="button"><b>Pretender</b></a>
        <a href="/class/shielder" class="button"><b>Shielder</b></a>
        <a href="/class/beast" class="button"><b>Beast</b></a>
    </div>

    <div class="grid">
        {% for servant in servants %}
        <a href=" /servant/{{ servant.servant_id }}/{{ servant.name }}" style="text-decoration: none; color: black;">
            <div class="card">
                <img src="{{ servant.graph_url_asc1 }}" alt="{{ servant.name }}">
                <p style="font-size: 18px; 
                font-weight: bold; 
                margin: 10px 0 5px;
                ">ID:{{ servant.servant_id }} | {{ servant.name }}
                </p>
                <p style="font-size: 16px; 
                color: gray; margin: 0;
                font-weight: bold;
                ">{{ servant.class_name.capitalize() }}
                </p>
            </div>
        </a>
        {% endfor %}
    </div>
</body>

</html>
