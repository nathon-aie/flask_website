<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ servant.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div style="margin: 20px;">
        <div>
            <a href="/class/all" class="button">←
                Back to All Servants</a>
        </div>

        <div class="detail-img">
            <img src="{{ servant.graph_url_asc1 }}" alt="{{ servant.name }} Ascension 1">
            <img src="{{ servant.graph_url_asc2 }}" alt="{{ servant.name }} Ascension 2">
            <img src="{{ servant.graph_url_asc3 }}" alt="{{ servant.name }} Ascension 3">
            <img src="{{ servant.graph_url_asc4 }}" alt="{{ servant.name }} Ascension 4">
        </div>

        <div style="font-size: 20px;">
            <h1>{{ servant.name }}</h1>
            <p>{{ servant.class_name.capitalize() }}</p>
        </div>

        <hr>

        <div>
            <div class="stat-box" style="font-size: 20px;">
                <p><b>ID:</b> {{ servant.servant_id }}</p>
                <p><b>Rarity:</b> {{ servant.rarity }} ⭐</p>
                <p><b>ATK:</b> {{ servant.atk_base }} → {{ servant.atk_max }} ⚔️</p>
                <p><b>Max HP:</b> {{ servant.hp_base }} → {{ servant.hp_max }} ❤️</p>
                <p><b>Traits:</b> {{ servant.traits }}</p>
            </div>
        </div>
    </div>
</body>

</html>
